; ================================================================
; hft_framework example configuration
;
; Copy this file to `config.ini` (next to the binary, or in the
; user data dir) and fill in your credentials. `config.ini` is
; gitignored — never commit one with real credentials.
;
; SimNow test broker (BrokerID=9999) is used as the default. Get
; a free SimNow account at http://www.simnow.com.cn/ to test
; against the official UAT environment.
; ================================================================

[Accounts]
; Comma-separated UserIDs to load. One section per ID below.
List =
; UserID to subscribe market data from (only one MD account at a time).
MarketDataAccount =
; Per-account gateway type. Default = CTP. 可选(optional):
;   <UserID>.Gateway = CTP      ; 通用 CTP 柜台(默认)
;   <UserID>.Gateway = QDP      ; 上期所 FTD 低延迟通道(仅期货,需 HFT_ENABLE_QDP=ON 编译)
;   <UserID>.Gateway = CTP_DUAL ; CTP 双活网关(主备自动切换)
;   <UserID>.Gateway = FIX      ; FIX 协议网关(stub,需 QuickFIX 集成)
;   <UserID>.Gateway = UDP      ; UDP 组播接收(跨机器行情分发)
;   <UserID>.Gateway = SHM      ; 共享内存接收(跨进程 IPC)
; QDP 与 CTP 接口同源,但没有 AppID/AuthCode 认证步骤。

; -- Per-account section --
;   [CTP.<UserID>]                 ; 通用 CTP
;   BrokerID    = 9999
;   UserID      = <UserID>
;   Password    = <plain or ENC:...>
;   AppID       = simnow_client_test
;   AuthCode    = 0000000000000000
;   TradeFront  = tcp://...
;   MarketFront = tcp://...
;
;   [QDP.<UserID>]                 ; 上期所 FTD(没有 AppID/AuthCode)
;   BrokerID    = <broker>
;   UserID      = <UserID>
;   Password    = <plain or ENC:...>
;   TradeFront  = tcp://...
;   MarketFront = tcp://...
;
; Passwords/AuthCode written as plaintext on first run are
; re-encrypted in-place (ENC:... DPAPI on Windows, equivalent
; on Linux) once the framework starts.

[CTP.template]
BrokerID    = 9999
UserID      =
Password    =
AppID       = simnow_client_test
AuthCode    = 0000000000000000
TradeFront  = tcp://182.254.243.31:40001
MarketFront = tcp://182.254.243.31:40011
; Backup fronts for CTP_DUAL gateway (双活网关备用前置)
; TradeFrontBackup  = tcp://...
; MarketFrontBackup = tcp://...

; QDP 模板:上期所 FTD 低延迟通道(Futures-only),仅 HFT_ENABLE_QDP=ON 编译生效。
; 与 CTP 模板的区别:不需要 AppID / AuthCode 两个字段。
[QDP.template]
BrokerID    =
UserID      =
Password    =
TradeFront  =
MarketFront =

[Strategies]
; Comma-separated strategy IDs. Each ID needs a [Strategy.<id>] section below.
List = demo_main

[Strategy.demo_main]
Type        = python
ScriptPath  = strategies/example_strategy.py
AccountID   =
Instruments = IF2406
OrderSize   = 1

[Risk]
; Pre-trade risk caps (per-account).
MaxOrderSize           = 5
MaxNetPosition         = 10
MaxOrdersPerMinute     = 30
MaxCancelRate          = 0.5
MaxDailyLoss           = 5000
CancelRateWindowMinutes = 60

[Trading]
; Comma-separated trading sessions, e.g. "09:00-11:30, 13:30-15:00, 21:00-02:30".
; Empty = always open (use only for SimNow testing).
TradingSessions =

[Performance]
; CPU core (0-based) for the consumer thread. -1 = no pinning.
EngineCpuCore               = -1
; CPU core for async logger. -1 = no pinning.
LoggerCpuCore               = -1
; CPU core to pin CTP SDK internal threads to. -1 = no pinning.
CtpThreadCpuCore            = -1
; NIC interrupt affinity (OS-level, not a config key):
;   Windows: Device Manager -> NIC -> Advanced -> RSS Base Processor,
;            or PowerShell: Set-NetAdapterRss -Name "Ethernet" -BaseProcessorNumber <core>
;   Pin NIC interrupts to a different core than EngineCpuCore to avoid contention.
EngineHighPriority          = 1
; RealtimePriority requires HFT_REALTIME_PRIORITY=1 env var to actually take effect.
RealtimePriority            = 0
; Hot-path toggles for production HFT runs. Disable non-essential work to
; minimize tick-to-order latency.
ProductionHftMode           = 0
MdBatchSize                 = 512
DisablePythonHotPath        = 0
DisableTickRecordingHotPath = 0
DisableKlineHotPath         = 0
StrategyHotInstrumentsOnly  = 0

[Log]
Level            = INFO
Directory        = logs
FilePrefix       = hft
QueueCapacity    = 8192
RecentBufferSize = 400
FlushIntervalMs  = 1000
RetentionDays    = 7

[Runtime]
; "interactive" (read q/quit/exit from stdin) or "service" (run until SIGTERM).
RunMode          = service
StateFile        = runtime_state.dat
; WAL (Write-Ahead Log) for crash recovery. Empty = disabled.
WalFile          =
NoTickWarnSeconds = 10
PythonHome       = python

[Watchdog]
; Standalone watchdog process monitors engine heartbeat via shared memory.
Enable              = 0
ShmName             = hft_watchdog
StaleThresholdMs    = 3000

[Features]
; AI/ML feature pipeline: SMA, EMA, RSI, ATR, VWAP, bid_ask_imbalance.
; Accessible from strategies via get_feature(instrument, name).
Enable              = 0
HistorySize         = 10000
SmaPeriod           = 20
EmaPeriod           = 20
RsiPeriod           = 14
AtrPeriod           = 14

[UDP]
; UDP multicast gateway for cross-machine tick distribution.
; Machine A: CTP gateway + UdpMdPublisher -> multicast
; Machine B: UdpMdGateway + Engine (Gateway.Type = UDP)
MulticastGroup      = 239.1.1.1
Port                = 5555
PublishEnabled      = 0

[Alerts]
; Optional webhook notification of risk events. Webhook is OUTBOUND only —
; no HTTP server is run.
WebhookEnabled = 0
WebhookUrl     =
; WebhookSecret will be DPAPI-encrypted on first save.
WebhookSecret  =
