name: build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  windows:
    name: Windows / VS 2022 / Release
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python (for pybind11)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pybind11
        run: python -m pip install --upgrade pip pybind11

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DENABLE_PYTHON=ON -DENABLE_TESTS=ON

      - name: Build hft_framework
        run: cmake --build build --config Release --target hft_framework

      - name: Build hft_tests
        run: cmake --build build --config Release --target hft_tests

      - name: Run tests
        # Tests that don't need a live CTP connection.
        run: ./dist/hft_tests.exe --gtest_filter=-*Live*:-*Integration*
        shell: bash
        continue-on-error: true

  linux:
    name: Linux / GCC / Release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build libiconv-hook-dev

      - name: Setup Python (for pybind11)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pybind11
        run: python -m pip install --upgrade pip pybind11

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DENABLE_PYTHON=ON -DENABLE_TESTS=ON

      - name: Build hft_framework
        run: cmake --build build --target hft_framework

      - name: Build hft_tests
        run: cmake --build build --target hft_tests

      - name: Run tests
        run: ./dist/hft_tests --gtest_filter=-*Live*:-*Integration*
        continue-on-error: true
